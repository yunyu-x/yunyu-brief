<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Tech Hotspot - {{DATE}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0f172a; padding: 24px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid #334155;">

                    <!-- Header -->
                    <tr>
                        <td style="padding: 40px 40px 24px; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
                            <div style="font-size: 32px; margin-bottom: 8px;">🔥</div>
                            <div style="font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px;">
                                X 技术热点简报
                            </div>
                            <div style="font-size: 13px; color: #64748b;">
                                {{DATE}} · 分析 {{TOTAL_FETCHED}} 条推文 · 精选 Top 10
                            </div>
                        </td>
                    </tr>

                    <!-- Trends Summary -->
                    <tr>
                        <td style="padding: 20px 32px;">
                            <table width="100%" cellpadding="0" cellspacing="0" style="background: #0f172a; border-radius: 12px; border: 1px solid #334155;">
                                <tr>
                                    <td style="padding: 18px 20px;">
                                        <div style="font-size: 13px; font-weight: 600; color: #60a5fa; margin-bottom: 8px;">📊 今日趋势</div>
                                        <div style="font-size: 14px; color: #94a3b8; line-height: 1.7;">{{TRENDS_SUMMARY}}</div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Top 3 Preview -->
                    <tr>
                        <td style="padding: 8px 32px 16px;">
                            <div style="font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 14px;">🏆 Top 3 速览</div>
                            <table width="100%" cellpadding="0" cellspacing="0">
                                {{TOP3_PREVIEW}}
                            </table>
                        </td>
                    </tr>

                    <!-- CTA Button -->
                    <tr>
                        <td style="padding: 20px 32px 12px; text-align: center;">
                            <div style="font-size: 12px; color: #64748b; margin-bottom: 14px;">还有 7 条精选热帖，点击查看完整简报 👇</div>
                            <table cellpadding="0" cellspacing="0" align="center">
                                <tr>
                                    <td style="background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 24px; padding: 14px 32px;">
                                        <a href="{{H5_URL}}" style="color: #ffffff; text-decoration: none; font-size: 15px; font-weight: 600; display: inline-block;">
                                            ✨ 查看完整简报
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Keywords -->
                    <tr>
                        <td style="padding: 20px 32px;">
                            <div style="font-size: 12px; color: #64748b; margin-bottom: 10px;">🔑 热门关键词</div>
                            <div style="font-size: 13px; color: #94a3b8; line-height: 2;">
                                {{KEYWORDS}}
                            </div>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 32px; text-align: center; border-top: 1px solid #334155;">
                            <div style="font-size: 11px; color: #475569;">
                                Powered by Paperboy 📬 · <a href="{{H5_URL}}" style="color: #60a5fa; text-decoration: none;">在浏览器中查看</a>
                            </div>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
