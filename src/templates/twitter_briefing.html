<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Tech Hotspot - {{DATE}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="640" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                    <!-- Header -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 30px 40px; text-align: center;">
                            <div style="font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 8px;">
                                🔥 X 技术热点简报
                            </div>
                            <div style="font-size: 14px; color: #94a3b8;">
                                {{DATE}} · 共分析 {{TOTAL_FETCHED}} 条推文 · 精选 Top 10
                            </div>
                        </td>
                    </tr>

                    <!-- Topics Tags -->
                    <tr>
                        <td style="padding: 20px 40px 10px;">
                            <div style="font-size: 13px; color: #64748b; margin-bottom: 8px;">关注话题：</div>
                            <div>{{TOPICS_TAGS}}</div>
                        </td>
                    </tr>

                    <!-- Trends Summary -->
                    <tr>
                        <td style="padding: 15px 40px;">
                            <div style="background: #f8fafc; border-left: 4px solid #3b82f6; border-radius: 0 8px 8px 0; padding: 16px 20px;">
                                <div style="font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 8px;">📊 今日趋势洞察</div>
                                <div style="font-size: 14px; color: #475569; line-height: 1.6;">{{TRENDS_SUMMARY}}</div>
                            </div>
                        </td>
                    </tr>

                    <!-- Top 10 Items -->
                    <tr>
                        <td style="padding: 10px 40px 20px;">
                            <div style="font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0;">
                                🏆 Top 10 技术热帖
                            </div>
                            <table width="100%" cellpadding="0" cellspacing="0">
                                {{TOP10_ITEMS}}
                            </table>
                        </td>
                    </tr>

                    <!-- Keywords -->
                    <tr>
                        <td style="padding: 15px 40px 25px;">
                            <div style="font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 10px;">🔑 热门关键词</div>
                            <div>{{KEYWORDS}}</div>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 20px 40px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <div style="font-size: 12px; color: #94a3b8;">
                                Powered by Paperboy 📬 · Auto-generated X Tech Briefing
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
